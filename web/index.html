<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Service</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
<div class="container mt-4">
    <h1>Transactions</h1>
    <div class="card mb-3">
        <div class="card-header">Add Transaction</div>
        <div class="card-body">
            <form id="addForm">
                <div class="row">
                    <div class="col">
                        <select name="type" class="form-select" required>
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                        </select>
                    </div>
                    <div class="col"><input name="category" placeholder="Category" class="form-control" required></div>
                    <div class="col"><input name="amount" type="number" step="any" placeholder="Amount" class="form-control" required></div>
                    <div class="col"><input name="date" type="date" class="form-control" required max=""></div>
                    <div class="col"><input name="description" placeholder="Description" class="form-control"></div>
                    <div class="col"><button type="submit" class="btn btn-primary">Add</button></div>
                </div>
            </form>
        </div>
    </div>

    <div class="card mb-3">
        <div class="card-header">Filters</div>
        <div class="card-body">
            <div class="row">
                <div class="col"><input type="date" id="filterFrom" class="form-control" placeholder="From"></div>
                <div class="col"><input type="date" id="filterTo" class="form-control" placeholder="To"></div>
                <div class="col"><input type="text" id="filterCategory" placeholder="Category" class="form-control"></div>
                <div class="col"><select id="filterType" class="form-select"><option value="">All</option><option value="income">Income</option><option value="expense">Expense</option></select></div>
                <div class="col"><button id="applyFilters" class="btn btn-secondary">Apply</button></div>
                <div class="col"><button id="exportCSV" class="btn btn-success">Export CSV</button></div>
            </div>
        </div>
    </div>

    <table class="table table-bordered" id="transactionsTable">
        <thead>
        <tr><th>Type</th><th>Category</th><th>Amount</th><th>Date</th><th>Description</th><th>Actions</th></tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="card mt-3">
        <div class="card-header">Analytics</div>
        <div class="card-body">
            <div class="row">
                <div class="col">From: <input type="date" id="analyticsFrom" class="form-control"></div>
                <div class="col">To: <input type="date" id="analyticsTo" class="form-control"></div>
                <div class="col"><button id="loadAnalytics" class="btn btn-info">Load</button></div>
                <div class="col"><button id="exportAnalyticsCSV" class="btn btn-info">Export Analytics CSV</button></div>
            </div>
            <div id="analyticsResult" class="mt-3"></div>
        </div>
    </div>
</div>

<script>
    let filterFrom2 = document.getElementById('filterFrom');
    let filterTo = document.getElementById('filterTo');

    filterFrom2.addEventListener('change', function() {
        if (filterTo.value && filterFrom2.value > filterTo.value) {
            filterTo.value = filterFrom2.value;
        }
    });
    filterTo.addEventListener('change', function() {
        if (filterFrom2.value && filterTo.value < filterFrom2.value) {
            filterFrom2.value = filterTo.value;
        }
    });

    let analyticsFrom = document.getElementById('analyticsFrom');
    let analyticsTo = document.getElementById('analyticsTo');

    analyticsFrom.addEventListener('change', function() {
        if (analyticsTo.value && analyticsFrom.value > analyticsTo.value) {
            analyticsTo.value = analyticsFrom.value;
        }
    });
    analyticsTo.addEventListener('change', function() {
        if (analyticsFrom.value && analyticsTo.value < analyticsFrom.value) {
            analyticsFrom.value = analyticsTo.value;
        }
    });
    $('#exportAnalyticsCSV').click(() => {
        let from = $('#analyticsFrom').val();
        let to = $('#analyticsTo').val();
        if(!from || !to) { alert('Select period first'); return; }
        window.location.href = `/api/export/analytics/csv?from=${from}&to=${to}`;
    });
    let today = new Date().toISOString().split('T')[0];
    document.querySelector('input[name="date"]').setAttribute('max', today);
    function loadTransactions() {
        let params = {};
        if ($('#filterFrom').val()) params.from = $('#filterFrom').val();
        if ($('#filterTo').val()) params.to = $('#filterTo').val();
        if ($('#filterCategory').val()) params.category = $('#filterCategory').val();
        if ($('#filterType').val()) params.type = $('#filterType').val();
        $.get('/api/items', params, function(data) {
            let tbody = $('#transactionsTable tbody').empty();
            data.forEach(tx => {
                let row = `<tr>
                    <td>${tx.type}</td><td>${tx.category}</td><td>${tx.amount}</td><td>${tx.date}</td><td>${tx.description || ''}</td>
                    <td><button class="btn btn-sm btn-danger delete-btn" data-id="${tx.id}">Delete</button></td>
                </tr>`;
                tbody.append(row);
            });
        });
    }

    $('#addForm').submit(function(e) {
        e.preventDefault();
        let data = {
            type: $('[name="type"]').val(),
            category: $('[name="category"]').val(),
            amount: parseFloat($('[name="amount"]').val()),
            date: $('[name="date"]').val(),
            description: $('[name="description"]').val()
        };
        $.post('/api/items', JSON.stringify(data), {contentType: 'application/json'})
            .done(() => { loadTransactions(); $('#addForm')[0].reset(); })
            .fail(err => alert('Error: '+err.responseJSON?.error));
    });

    $(document).on('click', '.delete-btn', function() {
        let id = $(this).data('id');
        if(confirm('Delete?')) {
            $.ajax({url: `/api/items/${id}`, method: 'DELETE'})
                .done(() => loadTransactions())
                .fail(err => alert('Delete failed'));
        }
    });

    $('#applyFilters').click(loadTransactions);
    $('#exportCSV').click(() => {
        let params = new URLSearchParams();
        if ($('#filterFrom').val()) params.append('from', $('#filterFrom').val());
        if ($('#filterTo').val()) params.append('to', $('#filterTo').val());
        window.location.href = '/api/export/csv?'+params.toString();
    });

    $('#loadAnalytics').click(() => {
        let from = $('#analyticsFrom').val();
        let to = $('#analyticsTo').val();
        if(!from || !to) { alert('Select period'); return; }
        $.get(`/api/analytics?from=${from}&to=${to}`, function(data) {
            $('#analyticsResult').html(`
                <p>Sum: ${data.sum} | Avg: ${data.avg} | Count: ${data.count} | Median: ${data.median} | 90th percentile: ${data.percentile_90}</p>
            `);
        });
    });
    loadTransactions();
</script>
</body>
</html>
